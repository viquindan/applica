name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /path/to/applica
          # Pull latest code
          git pull origin main
          
          # Install dependencies
          npm install
          
          # Push DB Migrations (Make sure to have DATABASE_URL exported in VPS)
          # using a local script because drizzle push requires TTY
          npx tsx migrate_roles.ts
          
          # Build Next.js Web App
          npm run build
          
          # Restart via PM2
          pm2 restart ecosystem.config.js --env production
