name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          cd "${{ secrets.VPS_APP_PATH }}"

          # Pull latest code
          git fetch origin main
          git reset --hard origin/main

          # Install dependencies (mobile/ has its own package.json, untouched
          # by this - only the root Next.js app is installed/built/deployed
          # here; the mobile app is distributed separately as an APK/store build)
          npm ci

          # Apply schema changes (DATABASE_URL must already be exported on the
          # VPS - e.g. in ~/.bashrc or a systemd EnvironmentFile - never
          # committed to the repo). --force skips the interactive TTY prompt.
          npx drizzle-kit push --force

          # Build Next.js Web App
          npm run build

          # Restart both the web app and the job worker (see ecosystem.config.js)
          pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
          pm2 save
