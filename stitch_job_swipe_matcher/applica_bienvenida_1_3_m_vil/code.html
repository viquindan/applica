<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F9;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .swipe-animation {
            animation: swipe-hint 3s infinite ease-in-out;
        }
        @keyframes swipe-hint {
            0% { transform: translateX(0) rotate(0deg); opacity: 1; }
            30% { transform: translateX(60px) rotate(5deg); opacity: 0.8; }
            60% { transform: translateX(-60px) rotate(-5deg); opacity: 0.8; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer-effect 2s infinite linear;
        }
        @keyframes shimmer-effect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top Navigation (Shell suppressed for onboarding/linear flow as per instructions) -->
<main class="flex-grow flex flex-col items-center justify-center relative overflow-hidden px-container-margin py-xl">
<!-- Background Atmospheric Element -->
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-72 h-72 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<!-- Progress Indicator -->
<div class="fixed top-xl flex gap-base z-10">
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-12 rounded-full bg-outline-variant"></div>
</div>
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Branding Section -->
<div class="mb-xl">
<span class="font-display-lg text-display-lg text-primary tracking-tighter">Applica</span>
</div>
<!-- Premium Illustration of Swipe Mechanic -->
<div class="relative w-full aspect-[3/4] max-h-[400px] mb-xl flex items-center justify-center">
<!-- Decorative Layer -->
<div class="absolute inset-0 border-[1px] border-outline-variant/30 rounded-[32px] scale-105"></div>
<!-- The Main Card Stack -->
<div class="relative w-64 h-80 flex items-center justify-center">
<!-- Background Cards (Visual Depth) -->
<div class="absolute w-full h-full bg-surface-container-highest rounded-3xl translate-y-4 scale-90 shadow-sm opacity-40"></div>
<div class="absolute w-full h-full bg-surface-container rounded-3xl translate-y-2 scale-95 shadow-md opacity-70"></div>
<!-- Top Card (Animated) -->
<div class="swipe-animation relative w-full h-full bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border border-outline-variant/20">
<div class="h-1/3 w-full bg-petroleo flex items-center justify-center relative">
<div class="shimmer absolute inset-0"></div>
<span class="material-symbols-outlined text-white text-5xl opacity-80" style="font-variation-settings: 'FILL' 1;">work</span>
<div class="absolute top-3 right-3 bg-secondary-container px-2 py-0.5 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-label-caps text-on-secondary-container">PREMIUM</span>
</div>
</div>
<div class="p-md flex-grow flex flex-col gap-xs text-left">
<div class="h-3 w-3/4 bg-surface-variant rounded-full"></div>
<div class="h-3 w-1/2 bg-surface-variant rounded-full opacity-60"></div>
<div class="mt-auto flex justify-between items-center">
<div class="flex gap-1">
<div class="h-6 w-6 rounded-full bg-secondary-container"></div>
<div class="h-6 w-12 bg-surface-variant rounded-full"></div>
</div>
<span class="material-symbols-outlined text-success-green" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Swipe Action Indicators -->
<div class="absolute -right-12 top-1/2 -translate-y-1/2 flex flex-col items-center opacity-40 group">
<div class="w-12 h-12 rounded-full border border-primary flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
<span class="font-label-bold text-primary mt-1">SI</span>
</div>
<div class="absolute -left-12 top-1/2 -translate-y-1/2 flex flex-col items-center opacity-40">
<div class="w-12 h-12 rounded-full border border-error flex items-center justify-center text-error">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<span class="font-label-bold text-error mt-1">NO</span>
</div>
</div>
</div>
<!-- Copy Section -->
<div class="flex flex-col gap-md mb-xl">
<h1 class="font-headline-md text-headline-md text-primary">Bienvenido a Applica</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                    La forma más rápida de encontrar tu próximo trabajo. Simplemente desliza para aplicar.
                </p>
</div>
</div>
</main>
<!-- Fixed Footer Action -->
<footer class="p-container-margin w-full max-w-md mx-auto">
<button class="w-full bg-primary text-white font-title-lg text-title-lg py-xl rounded-full shadow-lg hover:bg-primary-container active:scale-95 transition-all duration-200 flex items-center justify-center gap-sm">
            Siguiente
            <span class="material-symbols-outlined">chevron_right</span>
</button>
<div class="mt-lg text-center">
<button class="font-label-bold text-label-bold text-outline uppercase tracking-widest hover:text-primary transition-colors">
                Saltar intro
            </button>
</div>
</footer>
<script>
        // Micro-interaction for the button
        const nextBtn = document.querySelector('button');
        nextBtn.addEventListener('click', () => {
            // Subtle feedback would happen here
            console.log('Navegando al paso 2/3...');
        });

        // Add scroll animation reveal if content gets longer
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, .swipe-animation');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `all 0.6s ease-out ${index * 0.15}s`;
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
