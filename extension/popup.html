<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; font: 13px/1.5 Inter, system-ui, sans-serif; color: #16302f; background: #f6f8f8; }
    .hd { background: linear-gradient(135deg, #2A4A4F, #1d3438); color: #fff; padding: 14px 16px; font-weight: 700; font-size: 15px; }
    .bd { padding: 14px 16px; }
    label { font-weight: 600; font-size: 12px; color: #3a5b5f; }
    input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 9px 10px; border: 1px solid #cdd8d8; border-radius: 8px; font-size: 12px; }
    button { margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 8px; background: #2A4A4F; color: #fff; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    .muted { color: #6b8083; font-size: 11.5px; margin-top: 10px; }
    .ok { color: #2A4A4F; font-weight: 600; }
    a { color: #B09460; }
  </style>
</head>
<body>
  <div class="hd">Applica</div>
  <div class="bd">
    <label for="tok">Tu token de Applica</label>
    <input id="tok" type="password" placeholder="Pega tu token del dashboard" />
    <button id="save">Conectar</button>
    <div id="status" class="muted">Consigue tu token en el dashboard de Applica, secci&oacute;n Extensi&oacute;n.</div>
    <div class="muted">En la p&aacute;gina de la vacante, pulsa <b>"Llenar con Applica"</b> (abajo a la derecha). Revisas, adjuntas el CV, resuelves el captcha si aparece y env&iacute;as.</div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
